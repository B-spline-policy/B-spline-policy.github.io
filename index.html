    <style>

        @import url("https://fonts.googleapis.com/css?family=Source+Code+Pro:300,300i,400,400i,600,600i,700,700i&display=swap");
        @import url("https://fonts.googleapis.com/css2?family=Asap:ital,wght@0,100..700;1,100..700&display=swap");

        .container {
            max-width: 810px;
        }

        .list-inline {
            list-style: none;
            margin-left: -0.5em;
            margin-right: -0.5em;
            padding-left: 0;
        }

        .list-inline>li {
            display: inline-block;
            margin-left: 0.5em;
            margin-right: 0.5em;
        }

        a,
        a:focus {
            color: rgb(153, 51, 51); /* accent */
            text-decoration: none;
        }

        a:hover {
            color: rgb(153, 51, 51); /* accent */
            text-decoration: underline;
        }

        img {
            display: block;
            margin: 0 auto;
        }

        b {
            font-weight: 700;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: 'Asap', roboto, sans-serif;
            color: rgb(153, 51, 51); /* accent */
        }

        h1 {
            font-weight: 300;
            margin-top: 30px;
            margin-bottom: 20px;
            font-size: 48px;
        }

        h2 {
            font-weight: 300;
            margin-top: 35px;
            margin-bottom: 15px;
            font-size: 32px;
        }

        h3 {
            font-weight: 300;
            font-size: 24px;
        }

        h4 {
            font-size: 20px;
            font-weight: 400;
        }

        .text-small {
            font-size: 17px;
        }

        .text-large {
            font-size: 24px;
        }

        .text-title {
            font-size: 40px;
            font-weight: 700;
            font-variant: small-caps;
            font-family: 'Asap', roboto, sans-serif;
            color: rgb(153, 51, 51); /* accent */
        }

        .sm-name {
            font-size: 20px;
            font-weight: 700;
            font-variant: small-caps;
            font-family: 'Asap', roboto, sans-serif;
            color: rgb(153, 51, 51); /* accent */
        }

        .text-toplink {
            font-weight: 400;
        }

        .hero-links {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            margin-top: 18px;
        }

        .hero-link,
        .hero-link:focus {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 13px;
            border: 1px solid rgb(153, 51, 51);
            border-radius: 999px;
            background: #ffffff;
            color: rgb(153, 51, 51);
            font-family: 'Asap', roboto, sans-serif;
            font-size: 0.82em;
            font-weight: 500;
            line-height: 1.2;
            text-decoration: none;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }

        .hero-link:hover {
            background: rgb(153, 51, 51);
            color: #ffffff;
            border-color: rgb(153, 51, 51);
            text-decoration: none;
        }

        .teleop-showcase {
            margin: 1.2em 0 1.6em;
        }

        .teleop-label {
            font-size: 0.76em;
            font-weight: 700;
            letter-spacing: 0.09em;
            color: #666666;
            text-transform: uppercase;
            margin-bottom: 0.45em;
        }

        .teleop-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .teleop-grid-three {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .teleop-grid-mixed {
            grid-template-columns: minmax(0, 1.3fr) minmax(0, 1.3fr) minmax(0, 0.65fr);
        }

        .teleop-card {
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            background: #ffffff;
            overflow: hidden;
        }

        .teleop-card img,
        .teleop-card video {
            width: 100%;
            display: block;
            background: transparent;
        }

        .teleop-grid-mixed .teleop-card video {
            height: 210px;
            width: 100%;
            object-fit: cover;
        }

        .teleop-grid-mixed .teleop-card.iphone-video video {
            width: 90%;
            object-fit: cover;
            object-position: center;
            margin-left: auto;
            margin-right: auto;
        }

        .teleop-caption {
            font-size: 0.72em;
            font-weight: 600;
            letter-spacing: 0.06em;
            color: #666666;
            padding: 7px 10px;
            border-top: 1px solid #ececec;
        }

        @media screen and (max-width: 767px) {
            .teleop-grid {
                grid-template-columns: 1fr;
            }

            .teleop-grid-mixed .teleop-card video {
                height: auto;
                width: 100%;
                object-fit: cover;
            }

            .teleop-grid-mixed .teleop-card.iphone-video video {
                width: 50%;
            }
        }

        .text-caption {
            font-size: 20px;
            display: block;
        }

        .text-caption-xs {
            font-size: 14px;
            display: block;
        }

        .text-caption-small {
            font-size: 16px;
            color: #777777;
            display: block;
        }

        .text-equation {
            font-size: 110%;
        }

        .text-red {
            color: #f54254;
        }

        .text-blue {
            color: #598be7;
        }

        .text-tt {
            font-family: "Source Code Pro", "Lato", Verdana, Helvetica, sans-serif;
            font-weight: 400;
        }

        .top0 {
            margin-top: 0px;
        }

        .top5 {
            margin-top: 5px;
        }

        .top7 {

        }

        .top10 {

        }

        .top15 {

        .top17 {

        .top20 {

        }

        .top25 {

        }

        .top30 {
            margin-top: 30px;
        }

        .bottom0 {
            margin-bottom: 0px;
        }

        .bottom5 {
            margin-bottom: 5px;
        }

        .bottom7 {
            margin-bottom: 7px;
        }

        .bottom10 {
            margin-bottom: 10px;
        }

        .bottom15 {
            margin-bottom: 15px;
        }

        .bottom17 {
            margin-bottom: 17px;
        }

        .bottom20 {
            margin-bottom: 20px;
        }

        .bottom25 {
            margin-bottom: 25px;
        }

        .bottom30 {
            margin-bottom: 30px;
        }

        @media screen and (min-width: 992px) {
            .mobile-only {
                display: none;
            }
        }

        @media screen and (max-width: 991px) {
            .desktop-only {
                display: none;
            }

            .text-equation {
                font-size: 100%;
            }
        }

        @media screen and (min-width: 992px) {

            body,
            td,
            th,
            tr,
            p,
            a {
                font-family: 'Asap', roboto, sans-serif;
                font-size: 20px;
            }
        }

        @media screen and (max-width: 991px) {

            body,
            td,
            th,
            tr,
            p,
            a {
                font-family: 'Asap', roboto, sans-serif;
                font-size: 19px;
            }

            .text-title {
                font-size: 44px;
            }

            h1 {
                font-size: 40px;
            }
        }

        mjx-container[display="true"] {
            margin: 10px 0 !important;
        }
    </style>
